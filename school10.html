<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Школа №10 — меню</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">Школа №10</h1>
                <p class="subtitle">Основное меню школы №10</p>
                <p class="subtitle-small">Приложение №8 к СанПиН 2.3/2.4.3590-20</p>
            </div>
        </header>

        <div class="shift-selector">
            <button class="shift-btn active" data-shift="school10_first">Первая смена</button>
            <button class="shift-btn" data-shift="school10_second">Вторая смена</button>
        </div>

        <div class="menu-container" id="school10_first-shift">
            <div class="week-grid">
                <div class="loading-message">
                    <p>Загружаем данные из Excel файлов...</p>
                </div>
            </div>
        </div>

        <div class="menu-container hidden" id="school10_second-shift">
            <div class="week-grid">
                <div class="loading-message">
                    <p>Загружаем данные из Excel файлов...</p>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Школьное питание • Школа №10</p>
            <p>Приятного аппетита!</p>
        </footer>
    </div>

    <script src="menu_data_embedded.js"></script>
    <script src="json_loader.js"></script>
    <script src="script.js"></script>
</body>
</html>
